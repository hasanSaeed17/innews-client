<div class="login-container">
  <h2>Admin Login</h2>

  <form (ngSubmit)="login()" #loginForm="ngForm">
    <input
      type="email"
      name="email"
      placeholder="Email"
      required
      [(ngModel)]="email"
    />

    <input
      type="password"
      name="password"
      placeholder="Password"
      required
      [(ngModel)]="password"
    />

    <button type="submit" [disabled]="loginForm.invalid">
      Login
    </button>
  </form>

  <a routerLink="/forgot-password">Forgot <span style="text-decoration: underline; color: blue;">Password?</span></a><br> 

  <p class="error" *ngIf="error">{{ error }}</p>
</div>
